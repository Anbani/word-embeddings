# ვეფხისტყაოსანი corpus — its own vocab (raw forms, no lemmatization; archaic
# morphology defeats the modern affix rules). Text is already in-repo.
name: vef

# Full poem text, one verse line per row: id,line,chapter,chapter_id,strophe_id,line_id
source: src/data/rustaveli/raw/vef.csv

extract:
  # Each 4-line stanza (grouped by strophe_id) is treated as one context sentence.
  group_by: strophe_id
  min_georgian_ratio: 0.60

vocab:
  min_freq: 3               # raw surface forms with freq >= 3 (small corpus)
  min_occ: 3                # tiny poem: don't over-prune (accept noisier vectors)
  target_size: 65535        # own index space; keep <= u16 ceiling
  blocklist: src/data/vocab_blocklist.txt
  stopwords: src/data/stopwords_ka.txt
  # no aff / lemma_sources: vef uses raw surface forms (archaic morphology)
